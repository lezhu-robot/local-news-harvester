spring.config.import=optional:file:.env[.properties]
spring.jpa.generate-ddl=true
spring.datasource.url=jdbc:mariadb://localhost:3306/news_reader
spring.datasource.username=reader
spring.datasource.password=readerpass
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
server.address=0.0.0.0
server.port=8080

# Feature Flags
# Enable/Disable WEB type support and ingestion (default: false for RSS-only mode)
app.feature.web-ingest.enabled=false
# Enable/Disable TWITTER type support and ingestion (default: false)
app.feature.twitter-ingest.enabled=false
# Enable/Disable THREADS type support and ingestion (default: false)
app.feature.threads-ingest.enabled=true
# Enable/Disable background thumbnail generation tasks (default: false for RSS-only mode)
app.feature.thumbnail-task.enabled=false

# Scrape Creators Twitter provider
app.twitter.scrapecreators.base-url=https://api.scrapecreators.com
app.twitter.scrapecreators.api-key=${APP_TWITTER_SCRAPECREATORS_KEY:${APP_THREADS_SCRAPECREATORS_KEY:}}

# Scrape Creators Threads provider
app.threads.scrapecreators.base-url=https://api.scrapecreators.com
app.threads.scrapecreators.api-key=${APP_THREADS_SCRAPECREATORS_KEY:}
